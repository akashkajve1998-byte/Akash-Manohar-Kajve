- name: Deploy Apache Web Server
  hosts: webservers
  become: yes

  tasks:
    - name: Install Apache
      apt:
        name: apache2
        state: present
        update_cache: yes

    - name: Copy website files
      copy:
        src: ../website/index.html
        dest: /var/www/html/index.html

    - name: Start Apache
      service:
        name: apache2
        state: started
        enabled: yes